# docker-compose.mcpo.yml
# Optional v1.4 MCPO bridge for exposing selected MCP servers as OpenAPI tools.

services:
  mcpo-time:
    build:
      context: /root/veloce-research-os/tools/mcpo
    image: veloce/mcpo-time:0.1.0
    container_name: aiagency-mcpo-time
    restart: unless-stopped
    command:
      - uvx
      - mcpo
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${MCPO_API_KEY}
      - --
      - uvx
      - mcp-server-time
      - --local-timezone=America/New_York
    networks:
      - aiagency
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  aiagency:
    external: true
