# docker-compose.mcpo.yml
# Optional v1.4 MCPO bridge for exposing selected MCP servers as OpenAPI tools.

services:
  mcpo-time:
    build:
      context: /root/veloce-research-os/tools/mcpo
    image: veloce/mcpo-time:0.1.0
    container_name: aiagency-mcpo-time
    restart: unless-stopped
    command:
      - uvx
      - mcpo
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${MCPO_API_KEY}
      - --
      - uvx
      - mcp-server-time
      - --local-timezone=America/New_York
    networks:
      - aiagency
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcpo-openwebui-proxy:
    build:
      context: /root/veloce-research-os/tools/mcpo-openwebui-proxy
    image: veloce/mcpo-openwebui-proxy:0.1.0
    container_name: aiagency-mcpo-openwebui-proxy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCPO_BASE_URL: http://mcpo-time:8000
      PUBLIC_BASE_URL: https://tools.${DOMAIN}
      ALLOWED_ORIGIN: https://chat.${DOMAIN}
      OPENWEBUI_URL: http://openwebui:8080
      HERMES_URL: http://hermes:8642
      PAPERCLIP_URL: http://paperclip-iraj-paperclip-1:3100
      RESEARCH_REPO_PATH: /workspace/veloce-research-os
      RUFLO_SANDBOX_PATH: /workspace/ruflo-sandbox
    volumes:
      - /root/veloce-research-os:/workspace/veloce-research-os:ro
      - /opt/veloce-ruflo-sandbox:/workspace/ruflo-sandbox:ro
    networks:
      - aiagency
    expose:
      - "8080"
    depends_on:
      - mcpo-time
    labels:
      - traefik.enable=true
      - traefik.docker.network=aiagency
      - traefik.http.routers.aiagency-tools.rule=Host(`tools.${DOMAIN}`)
      - traefik.http.routers.aiagency-tools.entrypoints=websecure
      - traefik.http.routers.aiagency-tools.tls.certresolver=letsencrypt
      - traefik.http.services.aiagency-tools.loadbalancer.server.port=8080
      - traefik.http.routers.aiagency-tools-http.rule=Host(`tools.${DOMAIN}`)
      - traefik.http.routers.aiagency-tools-http.entrypoints=web
      - traefik.http.routers.aiagency-tools-http.middlewares=aiagency-tools-redirect
      - traefik.http.middlewares.aiagency-tools-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.aiagency-tools-redirect.redirectscheme.permanent=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  aiagency:
    external: true
